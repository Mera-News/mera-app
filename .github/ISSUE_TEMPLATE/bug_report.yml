name: Bug report
description: Report a reproducible problem in the Mera app
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Do **not** report security
        vulnerabilities here — see [SECURITY.md](../SECURITY.md) instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can a maintainer reproduce this?
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Visible in Settings.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS version
      placeholder: e.g. iPhone 15 Pro, iOS 18.2
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else. Redact any personal data.
