name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # `expo lint` reads .env via the expo CLI. Provide the committed example so
    # the lint step has the EXPO_PUBLIC_* vars it expects (no live endpoints are
    # contacted — the test step below uses jest-expo mocks).
    - name: Seed .env for lint
      run: cp .env.example .env

    - name: Run lint
      run: npm run lint

    - name: Typecheck
      run: npx tsc --noEmit

    - name: Run tests with coverage
      run: npm run test:coverage
